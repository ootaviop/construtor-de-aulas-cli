{# Template: referencias/m1v1.html #}
{# Dados esperados: {
     id: string,
     conteudo: string,  (HTML das referências — múltiplos <p class="text-break">)
   }
#}

<div class="d-center referencias">
    <span class="dica-navegacao">Clique no botão abaixo</span>
    <div class="btn-referencias" data-toggle="modal" data-target="#referencias-{{ id }}">
        <div id="referencias-{{ id }}" class="modal fade" role="dialog" tabindex="-1">
            <div class="modal-dialog modal-xl modal-dialog-centered" role="document">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 class="modal-title">Referências</h3>
                        <button class="close" type="button" aria-label="Close" data-dismiss="modal"><span aria-hidden="true">×</span></button>
                    </div>
                    <div class="modal-body">
                        {{ conteudo | safe }}
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-light" type="button" data-dismiss="modal">Fechar</button>
                    </div>
                </div>
            </div>
        </div>
        <i class="far fa-file"></i><span>Referências</span>
    </div>
</div>
<div class="separador-medio"></div>
