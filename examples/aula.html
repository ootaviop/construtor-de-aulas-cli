<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aula</title>
    <link rel="stylesheet" href="/projetos/componentes/card/v1.css">
    <link rel="stylesheet" href="/projetos/componentes/carrossel/v2.css">
    <link rel="stylesheet" href="/projetos/componentes/citacao/v1.css">
    <link rel="stylesheet" href="/projetos/componentes/destaque/v1.css">
    <link rel="stylesheet" href="/projetos/cursos/DP/90H/2026-1/custom/sanfona.css">
</head>
<body>
    <main class="conteudo-aula">
        


<div class="container secao citacao-m1v1" id="comp-0001">
    <div class="row">
        <div class="col-sm-12 col-md-11 col-lg-11 col-xl-9 m-auto">
            <div class="citacao-texto">
                <div class="p-citacao">
                    texto
                </div>
            </div>
        </div>
    </div>
</div>


<div class="container secao atencao-m1v1" id="comp-0002">
    <div class="row">
        <div class="col-sm-12 col-md-11 col-lg-11 col-xl-9 m-auto">
            <div class="destaque atencao">
                <div class="cabecalho">
                    <div class="div-imagem"></div>
                    <h4>Atenção</h4>
                </div>
                <div class="corpo">
                    texto
                </div>
            </div>
        </div>
    </div>
</div>


<div class="container secao carrossel-m1v2" id="comp-0003">
    <div class="row">
        <div class="col-sm-12 col-md-11 col-lg-11 col-xl-9 m-auto">
            <div class="carrossel-header">
                <p class="dica-navegacao">
                    <span class="icon-swipe">👆</span>
                    Use as setas para navegar
                </p>
                <p class="slide-counter">
                    <span class="current-slide">1</span> / <span class="total-slides">2</span>
                </p>
            </div>
            
            <div class="carrossel-wrapper">
                <div class="carousel slide"
                     data-ride="carousel"
                     data-interval="false"
                     data-wrap="false"
                     data-keyboard="true"
                     id="carousel-comp-0003">
                    
                    <div class="carousel-inner">
                        <div class="carousel-item active"
                             data-slide-index="1">
                            <div class="slide-content">
                                <div class="slide-body">
                                    conteúdo
                                </div>
                            </div>
                        </div>
                        <div class="carousel-item"
                             data-slide-index="2">
                            <div class="slide-content">
                                <div class="slide-body">
                                    conteúdo
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="carousel-controls">
                        <button class="carousel-control-prev" 
                                type="button"
                                data-target="#carousel-comp-0003"
                                data-slide="prev"
                                aria-label="Slide anterior">
                            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        </button>
                        <button class="carousel-control-next"
                                type="button"
                                data-target="#carousel-comp-0003"
                                data-slide="next"
                                aria-label="Próximo slide">
                            <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        </button>
                    </div>
                    
                    <div class="carousel-indicators-wrapper">
                        <ol class="carousel-indicators">
                            <li data-target="#carousel-comp-0003"
                                data-slide-to="0"
class="active"                                aria-label="Ir para slide 1"></li>
                            <li data-target="#carousel-comp-0003"
                                data-slide-to="1"
                                aria-label="Ir para slide 2"></li>
                        </ol>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>


<div class="container secao sanfona-m1v1" id="comp-0004">
    <div class="row">
        <div class="col-sm-12 col-md-11 col-lg-11 col-xl-9 m-auto">
            <div class="accordion-container">
                <p class="dica-navegacao">Clique nos títulos abaixo</p>
                
                <div class="accordion-item" id="comp-0004-item-0">
                    <a aria-expanded="false"
                       aria-controls="comp-0004-corpo-0"
                       type="button"
                       class="accordion-header"
                       id="comp-0004-header-0">
                        título
                    </a>
                    
                    <div class="accordion-content" id="comp-0004-corpo-0">
                        <div class="accordion-content-inner">
                            conteúdo
                        </div>
                    </div>
                </div>
                
            </div>
        </div>
    </div>
</div>



<div class="container secao flipcards-m1v1" id="comp-0005">
    <div class="row">
        <div class="col-sm-12 col-md-11 col-lg-11 col-xl-9 m-auto">
            <div class="flip-cards dica">
                <p>💡 Passe o mouse sobre o card</p>
            </div>
            <div class="flip-cards justify-start mb-4 mt-0">
                <div class="flip-card" aria-label="Card 1">
                    <div class="flip-card__inner">
                        <div class="flip-card__face flip-card__front">
                            <div class="flip-card__image">
                                <img class="img-fluid" src="https://recursos-moodle.caeddigital.net/projetos/cursos/MG/BH/2025-1/assets/img/textura-modal1.png" alt="">
                            </div>
                            <div class="flip-card__content">
                                <div class="flip-card__title">
                                    frente
                                </div>
                                <div class="flip-card__icon"></div>
                            </div>
                        </div>
                        
                        <div class="flip-card__face flip-card__back">
                            <div class="flip-card__description">
                                verso
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
    </main>
    <script src="/projetos/componentes/card/v1.js"></script>
    <script src="/projetos/componentes/carrossel/v2.js"></script>
    <script src="/projetos/componentes/sanfona/v1.js"></script>
</body>
</html>
